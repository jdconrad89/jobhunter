<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>JobHunter Extension Settings</title>
    <link rel="stylesheet" href="options.css">
  </head>
  <body>
    <main class="container">
      <h1>JobHunter Extension Settings</h1>
      <p class="intro">
        Connect this extension to your local JobHunter server. Generate a token in the app under
        <strong>API Token</strong>, then paste it here.
      </p>

      <form id="settings-form">
        <div class="field">
          <label for="apiBaseUrl">JobHunter server URL</label>
          <input id="apiBaseUrl" name="apiBaseUrl" type="url" required placeholder="http://localhost:3000">
          <p class="hint">Use the same host/port where you run <code>bin/rails server</code>.</p>
        </div>

        <div class="field">
          <label for="apiToken">API token</label>
          <input id="apiToken" name="apiToken" type="password" required placeholder="Paste token from JobHunter">
          <p class="hint">Sent as <code>Authorization: Bearer …</code> on API requests.</p>
        </div>

        <div class="actions">
          <button type="submit" class="primary">Save settings</button>
          <button type="button" id="toggle-token" class="secondary">Show token</button>
        </div>
      </form>

      <div id="status" class="status" role="status"></div>
    </main>

    <script src="options.js"></script>
  </body>
</html>
